name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

# Don't cancel in-progress deploys; let them finish and then run the next one.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Only deploy when CI succeeded (or on manual dispatch where there's no run).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.smrdime.cz
    steps:
      # Pin to the commit CI validated. Without this, workflow_run would
      # default to the tip of main, so a commit landing between CI success
      # and deploy start would ship untested code. workflow_dispatch has no
      # workflow_run payload; the fallback uses the dispatched ref's SHA.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # GOLEMIO_API_KEY is stored as a Cloudflare Worker secret
      # (one-time `wrangler secret put GOLEMIO_API_KEY`) — it persists across
      # deploys and is injected at runtime by Cloudflare, not built into the
      # bundle. CI only needs Cloudflare credentials to push the code.
      - name: Deploy to Cloudflare Workers
        run: pnpm run worker:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
